name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (vX.Y.Z)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code (tag push)
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Checkout code (manual tag)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          }
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Invalid tag format: $tag. Expected vX.Y.Z"
          }
          $version = $tag -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT

      - name: Sync and verify version metadata
        shell: pwsh
        run: |
          $expectedVersion = "${{ steps.version.outputs.VERSION }}"

          .\scripts\sync-version.ps1 -Version $expectedVersion
          .\scripts\stamp-version.ps1 -Version $expectedVersion

          $versionData = Import-PowerShellDataFile -Path ".\version.psd1"
          $actualVersion = [string]$versionData.Version
          if ($actualVersion -ne $expectedVersion) {
            throw "version.psd1 mismatch: expected $expectedVersion, found $actualVersion"
          }

          $status = git status --porcelain
          if ($status) {
            Write-Host "Version metadata drift detected:" -ForegroundColor Red
            $status
            git --no-pager diff -- .github/workflows/release.yml version.psd1 Start-SystemOptimizer.ps1 modules/*.psm1 run_optimization.bat scripts/sync-version.ps1 scripts/stamp-version.ps1
            throw "Version mismatch between tag and tracked files."
          }

          $changelog = Get-Content CHANGELOG.md -Raw
          $versionEscaped = [regex]::Escape($expectedVersion)
          if ($changelog -notmatch "(?m)^## \[$versionEscaped\]") {
            throw "CHANGELOG.md is missing section [$expectedVersion]"
          }

      - name: Build EXE with ps2exe
        shell: pwsh
        run: |
          Write-Host "Installing ps2exe..." -ForegroundColor Yellow
          Install-Module ps2exe -Force -Scope CurrentUser
          
          Write-Host "Building SystemOptimizer.exe..." -ForegroundColor Yellow
          
          # Build ps2exe command with optional icon
          $ps2exeParams = @{
            inputFile = "Start-SystemOptimizer.ps1"
            outputFile = "SystemOptimizer.exe"
            noConsole = $false
            noOutput = $false
            noError = $false
            requireAdmin = $true
            title = "System Optimizer"
            description = "Windows 10/11 Optimization Toolkit"
            company = "coff33ninja"
            product = "System Optimizer"
            copyright = "2025-2026"
            version = "${{ steps.version.outputs.VERSION }}"
            verbose = $true
          }

          $modulesDir = "modules"
          if (-not (Test-Path $modulesDir)) {
            Write-Error "Modules directory not found: $modulesDir"
            exit 1
          }

          $moduleFiles = Get-ChildItem -Path $modulesDir -Filter "*.psm1"
          if (-not $moduleFiles -or $moduleFiles.Count -eq 0) {
            Write-Error "No module files found to embed"
            exit 1
          }

          $embedFiles = @{}
          foreach ($moduleFile in $moduleFiles) {
            $embedFiles[".\modules\$($moduleFile.Name)"] = $moduleFile.FullName
          }

          if (-not (Test-Path "version.psd1")) {
            Write-Error "version.psd1 not found in repository root"
            exit 1
          }
          $embedFiles[".\version.psd1"] = (Resolve-Path "version.psd1").Path

          $ps2exeParams['embedFiles'] = $embedFiles
          Write-Host "Embedding $($moduleFiles.Count) modules and version.psd1" -ForegroundColor Green
          
          # Add icon if it exists
          if (Test-Path "icon.ico") {
            $ps2exeParams['iconFile'] = "icon.ico"
            Write-Host "Using icon.ico" -ForegroundColor Green
          } else {
            Write-Host "No icon.ico found, building without icon" -ForegroundColor Yellow
          }
          
          Invoke-ps2exe @ps2exeParams
          
          if (Test-Path "SystemOptimizer.exe") {
            $size = (Get-Item "SystemOptimizer.exe").Length / 1MB
            Write-Host "Build successful! Size: $([math]::Round($size, 2)) MB" -ForegroundColor Green
          } else {
            Write-Error "Build failed!"
            exit 1
          }

      - name: Extract changelog for this version
        id: changelog
        shell: pwsh
        run: |
          $changelogContent = Get-Content CHANGELOG.md -Raw
          $version = "${{ steps.version.outputs.VERSION }}"
          
          # Extract section for this version
          $pattern = "(?s)## \[$version\].*?(?=## \[|$)"
          if ($changelogContent -match $pattern) {
            $versionChangelog = $matches[0]
            # Save to file for GitHub release
            $versionChangelog | Out-File -FilePath changelog_excerpt.md -Encoding UTF8
            Write-Host "Extracted changelog for version $version"
          } else {
            Write-Warning "Could not find changelog for version $version"
            "No changelog found for this version." | Out-File -FilePath changelog_excerpt.md -Encoding UTF8
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: System Optimizer ${{ steps.version.outputs.TAG }}
          body_path: changelog_excerpt.md
          files: |
            SystemOptimizer.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SystemOptimizer-${{ steps.version.outputs.VERSION }}
          path: SystemOptimizer.exe
          retention-days: 90
